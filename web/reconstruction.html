<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic User Lists</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/all.min.css">
</head>
<body>
    <div class="controls">
        <div class="form-container">
            <label>Number of users:
                <input type="number" id="userCount" min="1" max="10" value="7" readonly>
            </label>

            <label>Threshold:
                <input type="number" id="threshold" min="0" value="4" readonly>
            </label>
        </div>

        <div class="button-container">
            <button class="styled-button" id="enc-button" onclick="window.location='./encryption.html'">
                Encryption
            </button>

            <button class="styled-button" id="rec-button" onclick="window.location='./sharing.html'">
                Sharing
            </button>
        </div>

        <div class="top-right-container">
            <button class="styled-random-button" id="random-button" onclick="random_reconstruction()">
                Random Construction
            </button>

            <button class="styled-button red-button" onclick="load_shares_for_reconstruction()">
                Reset
            </button>
        </div>
    </div>

    <div class="container" id="tableContainer"></div>

    <script type="module">
        import "./scripts/scripts.js";

        window.users_list = [];
        window.wShamir_list = new Map();
        window.global_threshold = 0;
        window.global_count = 0;
        window.auth_table = null;
        window.shares_count = 0;

        document.addEventListener("DOMContentLoaded", initializeTablesZIndex);

        window.addEventListener('beforeunload', () => {
            console.log('Saving state...');
            // saveState();
        });

        document.addEventListener('DOMContentLoaded', loadWasm);

        document.addEventListener('wasmLoaded', () => {
            load_shares_for_reconstruction();
        });
    </script>
</body>
</html>
